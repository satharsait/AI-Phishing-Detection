{% extends "base.html" %}
{% block title %}Login - PhishGuard{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-bg">
        <div class="hero-circle c1"></div>
        <div class="hero-circle c2"></div>
    </div>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <!-- Header -->
                    <div class="auth-header text-center">
                        <div class="auth-logo">
                            <i class="fas fa-shield-halved"></i>
                        </div>
                        <h2>Welcome Back</h2>
                        <p class="text-muted">Sign in to your PhishGuard account</p>
                    </div>

                    <!-- Form -->
                    <form method="POST" class="auth-form" novalidate>
                        <div class="form-group mb-3">
                            <label class="form-label">
                                <i class="fas fa-envelope me-2 text-primary"></i>Email Address
                            </label>
                            <input type="email" name="email" class="form-control form-control-lg"
                                   placeholder="you@example.com" required autocomplete="email">
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock me-2 text-primary"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password" name="password" id="password"
                                       class="form-control form-control-lg"
                                       placeholder="Enter your password" required autocomplete="current-password">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', 'eyeIcon1')">
                                    <i class="fas fa-eye" id="eyeIcon1"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember" id="remember">
                                <label class="form-check-label text-primary" for="remember">Remember me</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-right-to-bracket me-2"></i>Sign In
                        </button>
                    </form>

                    <div class="auth-footer text-center mt-4">
                        <p class="text-primary mb-0">
                            Don't have an account?
                            <a href="{{ url_for('register') }}" class="auth-link">Create one free</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
